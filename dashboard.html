<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipMind - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0D1B2A 0%, #1a2d3a 100%);
            color: #FFFFFF;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            max-width: 1000px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #1a2d3a;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #C9A84C;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-info {
            font-size: 14px;
            color: #B0B0B0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .upload-section {
            background: rgba(13, 27, 42, 0.95);
            border: 2px dashed #C9A84C;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-section:hover {
            border-color: #E0C158;
            background: rgba(13, 27, 42, 0.98);
        }
        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .upload-text {
            font-size: 18px;
            color: #FFFFFF;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .upload-subtext {
            font-size: 14px;
            color: #B0B0B0;
            margin-bottom: 20px;
        }
        #fileInput {
            display: none;
        }

            font-size: 15px;
