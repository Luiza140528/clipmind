<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipMind - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0D1B2A 0%, #1a2d3a 100%);
            color: #FFFFFF;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            max-width: 1000px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #1a2d3a;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #C9A84C;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-info {
            font-size: 14px;
            color: #B0B0B0;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .upload-section {
            background: rgba(13, 27, 42, 0.95);
            border: 2px dashed #C9A84C;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-section:hover {
            border-color: #E0C158;
            background: rgba(13, 27, 42, 0.98);
        }
        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .upload-text {
            font-size: 18px;
            color: #FFFFFF;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .upload-subtext {
            font-size: 14px;
            color: #B0B0B0;
            margin-bottom: 20px;
        }
        #fileInput {
            display: none;
        }
        .btn {
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .btn-primary {
            background: #C9A84C;
            color: #0D1B2A;
        }
        .btn-primary:hover {
            background: #E0C158;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            color: #C9A84C;
            border: 2px solid #C9A84C;
        }
        .btn-secondary:hover {
            background: #C9A84C;
            color: #0D1B2A;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .processing-section {
            background: rgba(13, 27, 42, 0.95);
            border: 1px solid #1a2d3a;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            display: none;
        }
        .processing-section.active {
            display: block;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(26, 45, 58, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #C9A84C, #E0C158);
            width: 0%;
            transition: width 0.3s;
        }
        .status-text {
            font-size: 14px;
            color: #B0B0B0;
            text-align: center;
        }
        .clips-section {
            background: rgba(13, 27, 42, 0.95);
            border: 1px solid #1a2d3a;
            border-radius: 15px;
            padding: 30px;
            display: none;
        }
        .clips-section.active {
            display: block;
        }
        .clips-title {
            font-size: 20px;
            color: #FFFFFF;
            margin-bottom: 20px;
        }
        .clips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .clip-card {
            background: rgba(26, 45, 58, 0.5);
            border: 1px solid #1a2d3a;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .clip-thumbnail {
            width: 100%;
            height: 140px;
            background: rgba(201, 168, 76, 0.1);
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .clip-title {
            font-size: 14px;
            color: #FFFFFF;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .clip-reason {
            font-size: 12px;
            color: #C9A84C;
            margin-bottom: 15px;
        }
        .clip-duration {
            font-size: 12px;
            color: #B0B0B0;
            margin-bottom: 15px;
        }
        .clip-btn {
            width: 100%;
            padding: 8px;
            font-size: 12px;
            background: #C9A84C;
            color: #0D1B2A;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .clip-btn:hover {
            background: #E0C158;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #C9A84C;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            .upload-section {
                padding: 40px 20px;
            }
            .upload-icon {
                font-size: 48px;
            }
            .upload-text {
                font-size: 16px;
            }
            .clips-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="logo">
            <span>🎬</span>
            <span>ClipMind</span>
        </a>
        <div class="user-info">Bem-vindo ao Dashboard</div>
    </div>

    <div class="container">
        <!-- Upload Section -->
        <div class="upload-section" id="uploadSection">
            <input type="file" id="fileInput" accept="video/*">
            <div class="upload-icon">📹</div>
            <div class="upload-text">Clique para fazer upload ou arraste um vídeo</div>
            <div class="upload-subtext">Formatos aceitos: MP4, WebM, MOV (Máx 500MB)</div>
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                Escolher Vídeo
            </button>
        </div>

        <!-- Processing Section -->
        <div class="processing-section" id="processingSection">
            <div style="margin-bottom: 20px;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-text" id="statusText">Iniciando processamento...</div>
            </div>
        </div>

        <!-- Clips Section -->
        <div class="clips-section" id="clipsSection">
            <a href="index.html" class="back-btn">← Voltar</a>
            <div class="clips-title">Seus Clips Gerados ✨</div>
            <div class="clips-grid" id="clipsGrid">
                <!-- Clips serão adicionados aqui dinamicamente -->
            </div>
        </div>
    </div>

    <script>
        const uploadSection = document.getElementById('uploadSection');
        const processingSection = document.getElementById('processingSection');
        const clipsSection = document.getElementById('clipsSection');
        const fileInput = document.getElementById('fileInput');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const clipsGrid = document.getElementById('clipsGrid');

        // Simular processamento
        function simulateProcessing() {
            uploadSection.style.display = 'none';
            processingSection.classList.add('active');
            
            const steps = [
                'Analisando vídeo...',
                'Transcrevendo áudio...',
                'Identificando momentos-chave...',
                'Gerando clips...',
                'Processamento concluído!'
            ];

            let step = 0;
            const interval = setInterval(() => {
                progressFill.style.width = ((step + 1) * 20) + '%';
                statusText.textContent = steps[step];
                step++;

                if (step >= steps.length) {
                    clearInterval(interval);
                    setTimeout(showClips, 1000);
                }
            }, 800);
        }

        // Mostrar clips gerados
        function showClips() {
            processingSection.classList.remove('active');
            clipsSection.classList.add('active');

            // Clips de exemplo
            const clips = [
                { title: 'Clip 1', reason: 'Promessa de campanha', duration: '30s' },
                { title: 'Clip 2', reason: 'Resposta a crítica', duration: '45s' },
                { title: 'Clip 3', reason: 'Destaque positivo', duration: '25s' },
                { title: 'Clip 4', reason: 'Momento viral', duration: '35s' }
            ];

            clipsGrid.innerHTML = clips.map((clip, idx) => `
                <div class="clip-card">
                    <div class="clip-thumbnail">🎬</div>
                    <div class="clip-title">${clip.title}</div>
                    <div class="clip-reason">${clip.reason}</div>
                    <div class="clip-duration">⏱️ ${clip.duration}</div>
                    <button class="clip-btn" onclick="downloadClip(${idx})">
                        ⬇️ Baixar
                    </button>
                </div>
            `).join('');
        }

        // Download simulado
        function downloadClip(idx) {
            alert(`Clip ${idx + 1} será baixado em breve!`);
        }

        // File input change
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                console.log('Arquivo selecionado:', file.name);
                simulateProcessing();
            }
        });

        // Drag and drop
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.style.background = 'rgba(201, 168, 76, 0.1)';
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.style.background = 'rgba(13, 27, 42, 0.95)';
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.style.background = 'rgba(13, 27, 42, 0.95)';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                simulateProcessing();
            }
        });
    </script>
</body>
</html>
